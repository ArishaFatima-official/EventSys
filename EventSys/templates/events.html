<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>EventSys — Browse Events</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

<!-- TOPBAR -->
<header class="student-topbar">
  <div class="student-logo"><a href="/" style="color:inherit;text-decoration:none;">📅 <strong>EventSys</strong></a></div>
  <nav class="student-nav">
    <a href="/" class="nav-link">🏠 Home</a>
    <a href="/events-page" class="nav-link active">📋 Events</a>
  </nav>
  <div class="student-user-area" id="userArea">
    <a href="/" class="btn btn-ghost btn-sm">Login</a>
    <a href="/signup" class="btn btn-primary btn-sm">Sign Up</a>
  </div>
</header>

<div class="student-body">
  <div style="max-width:960px;margin:0 auto;">

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
      <h1 style="font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;">📋 All Events</h1>
      <div class="search-box" style="width:260px;">
        <span>🔍</span>
        <input type="text" id="searchInput" placeholder="Search events..." oninput="searchTable('searchInput','evTable')"/>
      </div>
    </div>

    <!-- Events Grid -->
    <div id="eventsGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-bottom:40px;">
      <div style="color:var(--muted);text-align:center;padding:40px;grid-column:1/-1;">⏳ Loading events...</div>
    </div>

    <!-- My Registrations (shown when logged in) -->
    <div id="myRegsSection" style="display:none;">
      <div class="section-card">
        <div class="section-header">
          <h2>📝 My Registrations</h2>
        </div>
        <div class="table-wrapper">
          <table id="evTable">
            <thead><tr><th>Event</th><th>Date</th><th>Venue</th><th>Status</th><th>Action</th></tr></thead>
            <tbody id="myRegsBody">
              <tr><td colspan="5"><div class="empty-state"><p>No registrations yet.</p></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- REGISTER MODAL -->
<div class="modal-overlay" id="registerModal">
  <div class="modal">
    <h3>📝 Register for Event</h3>
    <input type="hidden" id="reg_eventid"/>
    <div id="reg_event_info" style="background:var(--surface2);border-radius:8px;padding:12px;margin-bottom:16px;font-size:0.85rem;color:var(--muted);"></div>
    <div class="form-group">
      <label>SAP ID</label>
      <input type="text" id="reg_sapid" placeholder="Your SAP ID" readonly/>
    </div>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="reg_name" placeholder="Your full name" readonly/>
    </div>
    <div class="form-group">
      <label>Department</label>
      <input type="text" id="reg_dept" placeholder="e.g. Computer Science"/>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="reg_email" placeholder="Your email" readonly/>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('registerModal')">Cancel</button>
      <button class="btn btn-primary" onclick="submitRegistration()">✅ Confirm Registration</button>
    </div>
  </div>
</div>

<script src="/static/script.js"></script>
<script>
  const student = JSON.parse(localStorage.getItem('student') || 'null');

  // Update topbar
  if (student) {
    document.getElementById('userArea').innerHTML = `
      <span style="color:var(--accent3);font-size:0.85rem;font-weight:500;">👋 ${student.fullname}</span>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
    `;
    document.getElementById('myRegsSection').style.display = 'block';
    loadMyRegistrations();
  }

  function logout() { localStorage.removeItem('student'); location.reload(); }

  async function loadEvents() {
    const events = await apiFetch('/events');
    const grid = document.getElementById('eventsGrid');
    if (!Array.isArray(events) || events.length === 0) {
      grid.innerHTML = `<div style="color:var(--muted);text-align:center;padding:40px;grid-column:1/-1;">📭 No events available right now.</div>`;
      return;
    }
    grid.innerHTML = events.map(e => {
      const seats    = e.capacity - (e.registered_count || 0);
      const full     = seats <= 0;
      const seatsColor = full ? 'badge-red' : seats < 10 ? 'badge-yellow' : 'badge-green';
      return `
        <div class="event-card">
          <div class="event-card-top">
            <span class="badge ${seatsColor}">${full ? 'Full' : seats + ' seats left'}</span>
          </div>
          <h3 class="event-card-title">${e.title}</h3>
          <div class="event-card-meta">
            <span>📅 ${e.date}</span>
            <span>📍 ${e.venue}</span>
            <span>👥 ${e.capacity} capacity</span>
          </div>
          <button class="btn ${full ? 'btn-ghost' : 'btn-primary'}" style="width:100%;justify-content:center;margin-top:12px;"
            ${full ? 'disabled' : ''}
            onclick="openRegister(${e.eventid}, '${e.title.replace(/'/g,"\\'")}', '${e.date}', '${e.venue.replace(/'/g,"\\'")}')">
            ${full ? '❌ Event Full' : student ? '📝 Register Now' : '🔐 Login to Register'}
          </button>
        </div>
      `;
    }).join('');
  }

  function openRegister(eventid, title, date, venue) {
    if (!student) { window.location.href = '/login'; return; }
    document.getElementById('reg_eventid').value  = eventid;
    document.getElementById('reg_event_info').innerHTML = `<strong>${title}</strong><br/>📅 ${date} &nbsp;|&nbsp; 📍 ${venue}`;
    document.getElementById('reg_sapid').value    = student.sapid;
    document.getElementById('reg_name').value     = student.fullname;
    document.getElementById('reg_email').value    = student.email;
    document.getElementById('reg_dept').value     = '';
    openModal('registerModal');
  }

  async function submitRegistration() {
    const body = {
      sapid:       document.getElementById('reg_sapid').value,
      studentname: document.getElementById('reg_name').value,
      department:  document.getElementById('reg_dept').value.trim(),
      email:       document.getElementById('reg_email').value,
      eventid:     parseInt(document.getElementById('reg_eventid').value),
      status:      'Registered'
    };
    if (!body.department) { showToast('Please enter your department', 'error'); return; }
    const res = await apiFetch('/registrations', 'POST', body);
    if (res.message) {
      showToast(res.message, 'success');
      closeModal('registerModal');
      loadEvents();
      loadMyRegistrations();
    } else {
      showToast(res.error || 'Failed', 'error');
    }
  }

  async function loadMyRegistrations() {
    if (!student) return;
    const data = await apiFetch(`/registrations/student/${student.sapid}`);
    const tbody = document.getElementById('myRegsBody');
    if (!Array.isArray(data) || data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><p>No registrations yet. Browse events above!</p></div></td></tr>`;
      return;
    }
    tbody.innerHTML = data.map(r => `
      <tr>
        <td><strong>${r.title}</strong></td>
        <td>${r.date}</td>
        <td>${r.venue}</td>
        <td><span class="badge badge-green">${r.status}</span></td>
        <td><button class="btn btn-danger btn-sm" onclick="cancelReg('${r.sapid}',${r.eventid})">Cancel</button></td>
      </tr>
    `).join('');
  }

  function cancelReg(sapid, eventid) {
    showConfirm('Cancel your registration for this event?', async () => {
      const res = await apiFetch(`/registrations/${sapid}/${eventid}`, 'DELETE');
      showToast(res.message || 'Cancelled', 'success');
      loadEvents();
      loadMyRegistrations();
    });
  }

  loadEvents();
</script>
</body>
</html>
