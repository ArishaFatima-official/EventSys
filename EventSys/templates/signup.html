<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>EventSys — Student Signup</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">📅 <strong>EventSys</strong></div>
    <h2>Create Account</h2>
    <p class="auth-sub">Register as a student</p>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="fullname" placeholder="Your full name"/>
    </div>
    <div class="form-group">
      <label>SAP ID</label>
      <input type="text" id="sapid" placeholder="e.g. 70123456"/>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="student@university.edu"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Choose a password"/>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirm" placeholder="Repeat password"/>
    </div>

    <button class="btn btn-success" style="width:100%;justify-content:center;padding:12px;" onclick="doSignup()">
      👤 Create Account
    </button>

    <div class="auth-footer">
      Already have an account? <a href="/">Login here</a>
    </div>
    
  </div>
</div>
<script src="/static/script.js"></script>
<script>
  if (localStorage.getItem('student')) window.location.href = '/student-page';

  async function doSignup() {
    const fullname = document.getElementById('fullname').value.trim();
    const sapid    = document.getElementById('sapid').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;

    if (!fullname || !sapid || !email || !password) { showToast('Fill all fields', 'error'); return; }
    if (password !== confirm) { showToast('Passwords do not match', 'error'); return; }

    const res = await apiFetch('/student/signup', 'POST', { fullname, sapid, email, password });
    if (res.message === 'Signup successful') {
      showToast('Account created! Please login.', 'success');
      setTimeout(() => window.location.href = '/', 1200);
    } else {
      showToast(res.error || res.message || 'Signup failed', 'error');
    }
  }
  document.addEventListener('keydown', e => { if(e.key==='Enter') doSignup(); });
</script>
</body>
</html>
